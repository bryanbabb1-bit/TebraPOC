<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PractiSynergy POC Dashboard</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); padding: 40px; color: var(--primary); }
        .container { max-width: 1000px; margin: auto; }
        header { text-align: center; margin-bottom: 40px; }
        
        /* KPI Section */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .kpi-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #7f8c8d; font-weight: bold; }
        .kpi-value { font-size: 2rem; font-weight: 800; margin: 10px 0; color: var(--primary); }
        
        /* Progress Bar */
        .progress-container { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 15px; }
        .progress-bar { background: var(--success); height: 100%; transition: width 1s ease-in-out; }
        
        /* Table Styles */
        .table-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .data-row { display: flex; justify-content: space-between; padding: 15px 10px; border-bottom: 1px solid #f1f1f1; align-items: center; }
        .data-row:last-child { border-bottom: none; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .paid { background: #eafaf1; color: var(--success); }
        .denied { background: #fdedec; color: #e74c3c; }
        .pending { background: #fef9e7; color: var(--warning); }
        
        .update-tag { font-size: 0.8rem; color: #bdc3c7; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PractiSynergy POC Dashboard</h1>
        <div class="update-tag">System Heartbeat: <span id="sync-time">Syncing...</span></div>
    </header>

    <div class="kpi-grid">
        <div class="card">
            <div class="kpi-label">Net Collected</div>
            <div class="kpi-value" id="kpi-collected">$0.00</div>
            <div class="kpi-label">vs. <span id="kpi-charges">$0</span> Gross Charges</div>
            <div class="progress-container">
                <div id="collection-bar" class="progress-bar" style="width: 0%"></div>
            </div>
        </div>

        <div class="card">
            <div class="kpi-label">Total Claims Value</div>
            <div class="kpi-value" id="kpi-claims-total">$0.00</div>
            <div id="claims-count" class="kpi-label">0 Records Processed</div>
        </div>
    </div>

    <div class="table-card">
        <h2>Detailed Claims Activity</h2>
        <div id="claims-list">
            <div style="text-align: center; color: #bdc3c7; padding: 40px;">Waiting for Box sync...</div>
        </div>
    </div>
</div>

<script>
    async function refreshDashboard() {
        try {
            // Force browser to fetch new JSON every time
            const response = await fetch('data.json?v=' + Date.now());
            const data = await response.json();
            const stats = data.stats || {};
            
            // 1. Update Heartbeat
            document.getElementById('sync-time').innerText = data.last_update || "Connecting...";

            // 2. Update Revenue KPIs
            const collected = stats.total_collected || 0;
            const charges = stats.total_charges || 1; // avoid divide by zero
            const percentage = Math.min((collected / charges) * 100, 100);

            document.getElementById('kpi-collected').innerText = '$' + collected.toLocaleString();
            document.getElementById('kpi-charges').innerText = charges.toLocaleString();
            document.getElementById('collection-bar').style.width = percentage + '%';

            // 3. Update Claims KPIs
            document.getElementById('kpi-claims-total').innerText = '$' + (stats.total_claims_value || 0).toLocaleString();
            document.getElementById('claims-count').innerText = (data.claims || []).length + " Active Records";

            // 4. Update Claims List
            const claimsList = data.claims || [];
            const container = document.getElementById('claims-list');
            
            if (claimsList.length === 0) {
                container.innerHTML = "<div style='text-align:center; padding:20px;'>No claims data found.</div>";
            } else {
                container.innerHTML = claimsList.map(c => {
                    const statusClass = (c.Status || '').toLowerCase();
                    return `
                        <div class="data-row">
                            <div>
                                <strong>${c.Claim_ID}</strong><br>
                                <span style="font-size: 0.8rem; color: #7f8c8d;">${c.Provider_Name}</span>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-weight: bold;">$${(c.Amount_Billed || 0).toLocaleString()}</div>
                                <span class="status-pill ${statusClass}">${c.Status || 'Unknown'}</span>
                            </div>
                        </div>
                    `;
                }).join('');
            }

        } catch (err) {
            console.error("Dashboard Error:", err);
        }
    }

    // Initial load
    refreshDashboard();
    // Auto-refresh every 30 seconds
    setInterval(refreshDashboard
