name: Box Data Sync

on:
  workflow_dispatch:
    inputs:
      box_file_id:
        description: 'The Box File ID from Pipedream'
        required: true
      box_file_name:
        description: 'The Box File Name (Optional)'
        required: false

jobs:
  process-box-file:
    runs-on: ubuntu-latest
    # Explicitly grant the Action permission to modify files in the repo
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Congregator Engine
        env:
          BOX_CLIENT_ID: ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
          NEW_FILE_ID: ${{ github.event.inputs.box_file_id }}
        run: |
          python congregate.py "$NEW_FILE_ID"

      - name: Commit and Push Dashboard Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          
          # This line prevents the Action from crashing if the data didn't change
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-sync Box data: ${{ github.event.inputs.box_file_name || 'Update' }}"
          
          # Pull latest changes to avoid conflicts, then push
          git pull --rebase origin main
          git push
