name: Update Dashboard Data
on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Force Install Dependencies to Workspace
        run: |
          python -m pip install --upgrade pip
          # We install boxsdk and pandas directly into the current directory
          python -m pip install pandas "boxsdk[all]" --target .

      - name: Run Congregator Script
        env:
          BOX_CLIENT_ID: ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
          # This tells Python to look in the current folder for the libraries
          PYTHONPATH: .
        run: python congregate.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Automated data update from Box" || exit 0
          git push
