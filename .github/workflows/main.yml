name: Update Dashboard Data
on:
  workflow_dispatch: # Allows manual trigger
  schedule:
    - cron: '0 12 * * *' # Runs daily at 12:00 UTC (7:00 AM CST)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas boxsdk[all]

      - name: Run Congregator Script
        env:
          # This pulls the secrets you saved in GitHub Settings
          BOX_CLIENT_ID: ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
        run: python congregate.py

      - name: Commit and Push the generated data.json
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data.json
          git commit -m "Automated data update from Box" || exit 0
          git push
