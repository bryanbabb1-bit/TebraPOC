name: Update Dashboard Data
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # We are force-installing to the current directory to ensure the script sees it
          pip install pandas boxsdk[jwt] --target .

      - name: Debug Environment
        run: |
          echo "Listing files in current directory:"
          ls -R | grep boxsdk || echo "boxsdk folder not found in current directory"

      - name: Run Congregator Script
        env:
          BOX_CLIENT_ID: ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
          # Explicitly tell Python to look in the current folder first
          PYTHONPATH: .
        run: python congregate.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Automated data update" || exit 0
          git push
