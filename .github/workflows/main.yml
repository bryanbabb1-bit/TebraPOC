name: Update Dashboard Data
on:
  workflow_dispatch: # This adds a "Run" button so you can test it manually
  schedule:
    - cron: '0 12 * * *' # Runs automatically every day at noon UTC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Pandas
        run: pip install pandas

      - name: Run Congregator Script
        run: python congregate.py

      - name: Commit and Push the generated data.json
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data.json
          git commit -m "Automated data update" || exit 0
          git push
