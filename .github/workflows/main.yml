name: Box Data Sync

on:
  workflow_dispatch:
    inputs:
      csv_content:
        description: 'Raw CSV text from Pipedream'
        required: true
      box_file_name:
        description: 'The Box File Name'
        required: true

jobs:
  process-box-file:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas

      - name: Run Congregator Engine
        env:
          CSV_CONTENT: ${{ github.event.inputs.csv_content }}
          FILE_NAME: ${{ github.event.inputs.box_file_name }}
        run: |
          # Save the text from Pipedream directly to a file
          echo "$CSV_CONTENT" > temp.csv
          python congregate.py "$FILE_NAME"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-sync Box data: ${{ github.event.inputs.box_file_name }}"
          git pull --rebase origin main
          git push
