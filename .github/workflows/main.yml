name: Update Dashboard Data
on:
  workflow_dispatch:
    inputs:
      box_file_id:
        description: 'ID from Pipedream'
        required: true
      box_file_name:
        description: 'Filename from Pipedream'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Deps
        run: pip install pandas requests

      - name: Run Congregator
        env:
          BOX_CLIENT_ID: ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
          NEW_FILE_ID: ${{ github.event.inputs.box_file_id }}
        run: python congregate.py "$NEW_FILE_ID"

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Box Sync: ${{ github.event.inputs.box_file_name }}" || exit 0
          # Fix for the "rejected" push error
          git pull --rebase origin main
          git push https://x-access-token:${{ secrets.WORKFLOW_TOKEN }}@github.com/${{ github.repository }}.git
