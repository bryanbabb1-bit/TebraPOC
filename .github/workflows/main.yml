name: Update Dashboard Data
on:
  # This allows Pipedream to "click the button" and send data
  workflow_dispatch:
    inputs:
      box_file_id:
        description: 'The ID of the file from Box'
        required: true
      box_file_name:
        description: 'The name of the file from Box'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Congregator Script
        env:
          BOX_CLIENT_ID: ${{ secrets.BOX_CLIENT_ID }}
          BOX_CLIENT_SECRET: ${{ secrets.BOX_CLIENT_SECRET }}
          # This captures the File ID sent from Pipedream
          NEW_FILE_ID: ${{ github.event.inputs.box_file_id }}
        run: python congregate.py "$NEW_FILE_ID"

      - name: Commit and Push Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # The "exit 0" prevents the workflow from failing if there's nothing new to save
          git commit -m "Webhook update: ${{ github.event.inputs.box_file_name }}" || exit 0
          # This uses your Personal Access Token (stored as WORKFLOW_TOKEN) to authorize the push
          git push https://x-access-token:${{ secrets.WORKFLOW_TOKEN }}@github.com/${{ github.repository }}.git
